name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            services/rag-api/pyproject.toml
            infra/docker/requirements.cpu.txt
      - name: Install CPU-only backend dependencies
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
          PIP_DEFAULT_TIMEOUT: "60"
        run: |
          python -m pip install --upgrade pip
          # GitHub-hosted runners have an unreliable route to the domestic CPU wheel CDN.
          # Production Docker builds on X1C retain their domestic mirror configuration.
          python -m pip install --prefer-binary --retries 2 --timeout 60 \
            --index-url https://download.pytorch.org/whl/cpu \
            torch==2.6.0+cpu
          python -m pip install --prefer-binary --retries 2 --timeout 60 \
            --index-url https://pypi.tuna.tsinghua.edu.cn/simple \
            -c infra/docker/requirements.cpu.txt \
            "./services/rag-api[postgres,prediction,dev]"
      - name: Lint backend
        working-directory: services/rag-api
        run: ruff check src tests
      - name: Test backend
        working-directory: services/rag-api
        env:
          PYTHONPATH: .
          PREDICTION_MODEL_DIR: ${{ github.workspace }}/services/rag-api/models/growth-route-transformer/v2.0.0
        run: pytest -q tests

  frontend:
    name: Frontend checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check RAG Web
        run: pnpm --filter @agentweb/rag-platform typecheck
      - name: Build RAG Web
        run: pnpm --filter @agentweb/rag-platform build

  deployment-assets:
    name: Deployment asset checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: bash -n scripts/*.sh
      - name: Verify deployment assets
        run: |
          test -f infra/compose/docker-compose.x1c.yml
          test -f infra/compose/docker-compose.e2e.yml
          test -f infra/compose/.env.x1c.example
          test -f infra/relay/nginx/aicrystal.yuanxiuliang.cn.conf
          test -f infra/docker/rag-api.Dockerfile
          test -f infra/docker/rag-api-test.Dockerfile
          test -f infra/docker/rag-web.Dockerfile
          test -f infra/systemd/agentweb-rag.service
          test -f infra/systemd/agentweb-rag-tunnel.service
          test -f rawData.jsonl
          test -x scripts/deploy-x1c-rag.sh
          test -x scripts/x1c-auto-deploy.sh
          test -x e2e/run-rag-e2e.sh
          test -f e2e/fixtures/growth_records.text_only.jsonl
          test -f e2e/fixtures/growth_records.raw.jsonl
          test -f services/rag-api/src/retrieval/fact_catalog.py
          grep -Fq 'COPY e2e/fixtures /opt/agentweb/e2e/fixtures' infra/docker/rag-api-test.Dockerfile
          grep -Fq 'RAG_CATALOG_INPUT' infra/docker/entrypoints/rag-bootstrap.sh
          grep -Fq 'catalog_status=ready' e2e/run-rag-e2e.sh
          grep -Fq 'proxy_cache off;' infra/relay/nginx/aicrystal.yuanxiuliang.cn.conf
          grep -Fq 'StartLimitIntervalSec=0' infra/systemd/agentweb-rag-tunnel.service
          grep -Fq 'ExitOnForwardFailure=yes' infra/systemd/agentweb-rag-tunnel.service
          grep -Fq -- '-R 127.0.0.1:13003:127.0.0.1:3003' infra/systemd/agentweb-rag-tunnel.service
          grep -Fq -- '-R 127.0.0.1:18003:127.0.0.1:8003' infra/systemd/agentweb-rag-tunnel.service

  rag-e2e:
    name: Real LLM RAG end-to-end
    needs: [backend, frontend, deployment-assets]
    # Real LLM credentials must never be exposed to pull-request code. The protected main push
    # and a manually triggered run execute this release gate after the non-secret PR checks.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      RAG_E2E_LLM_BASE_URL: ${{ secrets.RAG_E2E_LLM_BASE_URL }}
      RAG_E2E_LLM_API_KEY: ${{ secrets.RAG_E2E_LLM_API_KEY }}
      RAG_E2E_LLM_MODEL: ${{ secrets.RAG_E2E_LLM_MODEL }}
      npm_config_registry: https://registry.npmmirror.com
      PLAYWRIGHT_DOWNLOAD_HOST: https://npmmirror.com/mirrors/playwright
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Require real LLM configuration
        run: |
          test -n "$RAG_E2E_LLM_BASE_URL"
          test -n "$RAG_E2E_LLM_API_KEY"
          test -n "$RAG_E2E_LLM_MODEL"
      - name: Install browser test dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run disposable RAG end-to-end tests
        run: ./e2e/run-rag-e2e.sh
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rag-e2e-browser-diagnostics
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
