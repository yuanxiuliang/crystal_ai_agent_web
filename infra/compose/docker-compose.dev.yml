services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentweb-memory-postgres
    environment:
      POSTGRES_DB: agentweb
      POSTGRES_USER: agentweb
      POSTGRES_PASSWORD: agentweb
    ports:
      - "5432:5432"
    volumes:
      - agentweb_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentweb -d agentweb"]
      interval: 5s
      timeout: 3s
      retries: 20

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: agentweb-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    volumes:
      - agentweb_milvus_etcd:/etcd

  milvus-minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: agentweb-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9091"
    ports:
      - "9000:9000"
      - "9091:9091"
    volumes:
      - agentweb_milvus_minio:/minio_data

  milvus-standalone:
    image: milvusdb/milvus:v2.6.0
    container_name: agentweb-milvus-standalone
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "19530:19530"
      - "9092:9091"
    volumes:
      - agentweb_milvus:/var/lib/milvus
    depends_on:
      - milvus-etcd
      - milvus-minio

volumes:
  agentweb_postgres:
  agentweb_milvus_etcd:
  agentweb_milvus_minio:
  agentweb_milvus:
