name: ${COMPOSE_PROJECT_NAME:-agentweb-rag}

x-rag-runtime: &rag-runtime
  image: agentweb-rag-api:x1c
  build:
    context: ../..
    dockerfile: infra/docker/rag-api.Dockerfile
  env_file:
    - ${RAG_ENV_FILE:-.env.x1c}
  environment:
    RAG_API_HOST: 0.0.0.0
    RAG_API_PORT: 8003
    RETRIEVAL_PROVIDER: milvus-hybrid
    GROWTH_RECORDS_PATH: /opt/agentweb/rawData.jsonl
    RAG_CATALOG_INPUT: /opt/agentweb/rawData.jsonl
    MILVUS_URI: http://milvus-standalone:19530
    MILVUS_COLLECTION: growth_records_minilm
    EMBEDDING_PROVIDER: local
    EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
    EMBEDDING_BACKEND: onnx
    EMBEDDING_ONNX_MODEL_PATH: /opt/agentweb/models/all-MiniLM-L6-v2-int8/onnx/model_quint8_avx2.onnx
    EMBEDDING_TOKENIZER_PATH: /opt/agentweb/models/all-MiniLM-L6-v2-int8
    EMBEDDING_DIM: 384
    EMBEDDING_BATCH_SIZE: 4
    EMBEDDING_MAX_LENGTH: 256
    EMBEDDING_DEVICE: cpu
    MEMORY_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    PREDICTION_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    MEMORY_CHECKPOINT_BACKEND: postgres
    MEMORY_SEMANTIC_SEARCH_ENABLED: "true"
    MEMORY_POSTGRES_CONNECT_TIMEOUT_SECONDS: 5
    MEMORY_WORKER_POLL_SECONDS: 3
    PREDICTION_ENABLED: "true"
    PREDICTION_DEVICE: cpu
    PREDICTION_TORCH_THREADS: 2
    PREDICTION_MAX_CONCURRENCY: 1
    PREDICTION_MODEL_DIR: /opt/agentweb/services/rag-api/models/growth-route-transformer/v2.0.0
    OMP_NUM_THREADS: 2
    OPENBLAS_NUM_THREADS: 2
    MKL_NUM_THREADS: 2
    TOKENIZERS_PARALLELISM: "false"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - max_connections=50
    volumes:
      - agentweb_postgres:/var/lib/postgresql/data
    networks:
      - rag-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30
    mem_limit: 768m

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    volumes:
      - agentweb_milvus_etcd:/etcd
    networks:
      - rag-data
    mem_limit: 384m

  milvus-minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Keep the legacy names in sync for the pinned MinIO release used by Milvus.
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    command: minio server /minio_data
    volumes:
      - agentweb_milvus_minio:/minio_data
    networks:
      - rag-data
    mem_limit: 512m

  milvus-standalone:
    image: milvusdb/milvus:v2.6.0
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    volumes:
      - agentweb_milvus:/var/lib/milvus
    networks:
      - rag-data
    depends_on:
      - milvus-etcd
      - milvus-minio
    mem_limit: 5g

  rag-bootstrap:
    <<: *rag-runtime
    command: ["sh", "/opt/agentweb/infra/docker/entrypoints/rag-bootstrap.sh"]
    restart: "no"
    healthcheck:
      disable: true
    networks:
      - rag-data
    depends_on:
      postgres:
        condition: service_healthy
      milvus-standalone:
        condition: service_started
    mem_limit: 2g

  rag-memory-worker:
    <<: *rag-runtime
    command: ["python", "-m", "src.cli.rag_memory_worker"]
    restart: unless-stopped
    healthcheck:
      disable: true
    networks:
      - rag-data
    depends_on:
      rag-bootstrap:
        condition: service_completed_successfully
    mem_limit: 768m

  rag-api:
    <<: *rag-runtime
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8003"
    networks:
      - rag-data
      - rag-edge
    depends_on:
      rag-bootstrap:
        condition: service_completed_successfully
    mem_limit: 3g

  rag-web:
    image: agentweb-rag-web:x1c
    build:
      context: ../..
      dockerfile: infra/docker/rag-web.Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3003"
    networks:
      - rag-edge
    depends_on:
      rag-api:
        condition: service_healthy
    mem_limit: 384m

networks:
  rag-data:
    internal: true
  rag-edge:

volumes:
  agentweb_postgres:
  agentweb_milvus_etcd:
    name: ${COMPOSE_PROJECT_NAME:-agentweb-rag}_milvus_etcd_compat
  agentweb_milvus_minio:
    # Keep a failed first-boot MinIO configuration untouched while the deployment switches
    # to a newly initialized object-store volume with the current internal credentials.
    name: ${COMPOSE_PROJECT_NAME:-agentweb-rag}_milvus_minio_compat
  agentweb_milvus:
    name: ${COMPOSE_PROJECT_NAME:-agentweb-rag}_milvus_compat
