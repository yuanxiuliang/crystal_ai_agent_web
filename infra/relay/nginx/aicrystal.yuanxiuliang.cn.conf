server {
    listen 80;
    listen 443 ssl http2;
    server_name aicrystal.yuanxiuliang.cn;

    ssl_certificate     /www/server/panel/vhost/cert/aicrystal.yuanxiuliang.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/aicrystal.yuanxiuliang.cn/privkey.pem;
    ssl_protocols TLSv1.2;

    client_max_body_size 16m;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/agentweb-acme;
        try_files $uri =404;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:18003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
        gzip off;
        proxy_connect_timeout 15s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        add_header X-Accel-Buffering no always;
    }

    location / {
        proxy_pass http://127.0.0.1:13003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
        proxy_connect_timeout 15s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
